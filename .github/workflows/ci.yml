name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The lowest version we claim to support, plus current LTS and latest.
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Must run after build: it inspects the packed dist/, so a stale or
      # missing build would otherwise let it pass on the wrong artifacts.
      - run: npm run check-exports
